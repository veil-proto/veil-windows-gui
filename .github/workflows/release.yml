name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CalVer version (YY.M.D, e.g. 26.7.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Build binaries
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          go build -trimpath -ldflags "-s -w -H windowsgui" -o dist\veil-gui.exe .\cmd\veil-gui
          go build -trimpath -ldflags "-s -w" -o dist\veil-service.exe .\cmd\veil-service
          Copy-Item driver\amd64\veiltun.dll dist\veiltun.dll
      - name: Build MSI
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          wix build packaging\veil.wxs `
            -arch x64 `
            -d SourceDir="$PWD\dist" `
            -d Version="$env:VERSION" `
            -o "dist\VEIL-$env:VERSION-x64.msi"
          Get-FileHash dist\* | ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } | Set-Content dist\SHA256SUMS
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$env:VERSION" dist\* `
            --title "VEIL Windows GUI $env:VERSION" `
            --notes "Manual VEIL Windows GUI release $env:VERSION."
