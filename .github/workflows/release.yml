name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CalVer version (YY.M.D, e.g. 26.7.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Install frontend deps
        run: npm ci
      - name: Build sidecar
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          New-Item -ItemType Directory -Force src-tauri\binaries | Out-Null
          go build -trimpath -ldflags "-s -w" -o src-tauri\binaries\veil-sidecar-x86_64-pc-windows-msvc.exe .\cmd\veil-sidecar
      - name: Build Tauri app
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $config = '"{""version"":""' + $env:VERSION + '""}"'
          npx tauri build --config $config
      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src-tauri\target\release\bundle\msi\*.msi dist\
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe dist\
          Get-FileHash dist\* | ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } | Set-Content dist\SHA256SUMS
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$env:VERSION" dist\* `
            --title "VEIL $env:VERSION" `
            --notes "VEIL Windows client $env:VERSION (Tauri + Vue, Go veil-sidecar)."
