name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Install frontend deps
        run: npm ci
      - name: Build sidecar
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          New-Item -ItemType Directory -Force src-tauri\binaries | Out-Null
          go build -o src-tauri\binaries\veil-sidecar-x86_64-pc-windows-msvc.exe .\cmd\veil-sidecar
      - name: Go test
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          go test ./...
      - name: Frontend test
        run: npm run test
      - name: Build Tauri app (no bundle)
        run: npx tauri build --no-bundle
