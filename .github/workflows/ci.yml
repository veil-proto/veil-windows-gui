name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Build GUI and service
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          go build -ldflags "-H windowsgui" ./cmd/veil-gui
          go build ./cmd/veil-service
      - name: Test
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          go test ./...
