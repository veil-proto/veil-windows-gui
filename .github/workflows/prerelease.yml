name: Prerelease

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Install frontend deps
        run: npm ci
      - name: Build sidecar
        shell: pwsh
        run: |
          $ver = Get-Date -Format "yy.M.d"
          $sha = "${env:GITHUB_SHA}".Substring(0, 7)
          $env:Path = "C:\msys64\mingw64\bin;$env:Path"
          $env:CGO_ENABLED = "1"
          New-Item -ItemType Directory -Force src-tauri\binaries | Out-Null
          go build -trimpath -ldflags "-s -w" -o src-tauri\binaries\veil-sidecar-x86_64-pc-windows-msvc.exe .\cmd\veil-sidecar
          "VERSION=$ver" >> $env:GITHUB_ENV
          "SHORT_SHA=$sha" >> $env:GITHUB_ENV
      - name: Build Tauri app
        shell: pwsh
        run: |
          $configPath = Join-Path $env:RUNNER_TEMP "tauri-build-config.json"
          @{ version = $env:VERSION } | ConvertTo-Json -Compress | Set-Content -NoNewline -Encoding utf8 $configPath
          npx tauri build --config $configPath
      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src-tauri\target\release\bundle\msi\*.msi dist\
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe dist\
          Get-FileHash dist\* | ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } | Set-Content dist\SHA256SUMS
      - name: Publish rolling prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete prerelease --yes --cleanup-tag 2>$null
          gh release create prerelease dist\* `
            --prerelease `
            --title "Prerelease $env:VERSION ($env:SHORT_SHA)" `
            --notes "Rolling Windows prerelease from ``$env:GITHUB_SHA``. Tauri + Vue client with the Go veil-sidecar and VEIL TUN driver bundled inside the MSI/NSIS installer."
